name: diagnosticmeta
title: Diagnostic Test Meta-Analysis for Pathology
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        children:
          - type: Label
            label: Study Names (Required)
            fitToGrid: true
          - type: VariablesListBox
            name: study
            maxItemCount: 1
            isTarget: true
            itemDropBehaviour: overwrite
      - type: TargetLayoutBox
        children:
          - type: Label
            label: True Positives (Disease+, Test+)
            fitToGrid: true
          - type: VariablesListBox
            name: true_positives
            maxItemCount: 1
            isTarget: true
            itemDropBehaviour: overwrite
      - type: TargetLayoutBox
        children:
          - type: Label
            label: False Positives (Disease-, Test+)
            fitToGrid: true
          - type: VariablesListBox
            name: false_positives
            maxItemCount: 1
            isTarget: true
            itemDropBehaviour: overwrite
      - type: TargetLayoutBox
        children:
          - type: Label
            label: False Negatives (Disease+, Test-)
            fitToGrid: true
          - type: VariablesListBox
            name: false_negatives
            maxItemCount: 1
            isTarget: true
            itemDropBehaviour: overwrite
      - type: TargetLayoutBox
        children:
          - type: Label
            label: True Negatives (Disease-, Test-)
            fitToGrid: true
          - type: VariablesListBox
            name: true_negatives
            maxItemCount: 1
            isTarget: true
            itemDropBehaviour: overwrite
      - type: TargetLayoutBox
        children:
          - type: Label
            label: Meta-Regression Variable (Optional)
            fitToGrid: true
          - type: VariablesListBox
            name: covariate
            maxItemCount: 1
            isTarget: true
            itemDropBehaviour: overwrite
  - type: LayoutBox
    margin: large
    stretchFactor: 2
    children:
      - type: Label
        label: Analysis Options
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: bivariate_analysis
                label: Bivariate random-effects model
              - type: CheckBox
                name: hsroc_analysis
                label: HSROC analysis (summary ROC curve)
              - type: CheckBox
                name: heterogeneity_analysis
                label: Heterogeneity assessment (study variability)
              - type: CheckBox
                name: meta_regression
                label: Meta-regression (explore covariate effects)
                enable: (!is.null(covariate) && covariate !="")
              - type: CheckBox
                name: publication_bias
                label: Publication bias assessment (Deeks' test)
              - type: CheckBox
                name: show_individual_studies
                label: Individual study results
      - type: Label
        label: Advanced Options
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: TextBox
                name: confidence_level
                label: Confidence Level (%)
                format: number
                suffix: '%'
              - type: ComboBox
                name: method
                label: Estimation method
      - type: Label
        label: Visualization Options
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: forest_plot
                label: Forest plot (sensitivity & specificity)
              - type: CheckBox
                name: sroc_plot
                label: Summary ROC plot
              - type: CheckBox
                name: funnel_plot
                label: Funnel plot (publication bias)
                enable: (publication_bias)
              - type: ComboBox
                name: color_palette
                label: Plot colors (accessibility)
              - type: CheckBox
                name: show_plot_explanations
                label: Plot explanations & interpretation
      - type: Label
        label: Reporting Options
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: show_interpretation
                label: Clinical interpretation
              - type: CheckBox
                name: show_methodology
                label: Methodology information
              - type: CheckBox
                name: show_analysis_summary
                label: Analysis summary
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: zero_cell_correction
